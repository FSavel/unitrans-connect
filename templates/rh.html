<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ t.rh_title }}</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f6f8;
    margin:0;
}

.container{
    max-width:700px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

h2{
    text-align:center;
    color:#0d4d2c;
}

label{
    display:block;
    margin-top:12px;
    font-weight:bold;
}

select, textarea, button{
    width:100%;
    padding:10px;
    margin-top:8px;
    border-radius:6px;
    border:1px solid #ccc;
}

textarea{
    height:130px;
    resize:none;
}

button{
    background:#0d4d2c;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#14683c;
}

.back{
    display:block;
    margin-top:15px;
    text-align:center;
    background:#0d4d2c;
    color:white;
    padding:10px;
    border-radius:8px;
    text-decoration:none;
}

/* popup */
.popup{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.55);
}

.popup-box{
    background:white;
    width:90%;
    max-width:420px;
    margin:120px auto;
    padding:25px;
    border-radius:12px;
    text-align:center;
}

.popup-box h3{
    margin-top:0;
}

.popup-box button{
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>{{ t.rh_title }}</h2>

<p>{{ t.rh_text }}</p>

<label>
{% if session["lang"] == "en" %}
Message Type
{% else %}
Tipo de Mensagem
{% endif %}
</label>

<select id="tipo">
<option value="">--</option>
<option>Sugestão / Suggestion</option>
<option>Reclamação / Complaint</option>
<option>Falha Técnica / Technical Issue</option>
<option>Pedido RH / HR Request</option>
</select>

<label>
{% if session["lang"] == "en" %}
Message
{% else %}
Mensagem
{% endif %}
</label>

<textarea id="mensagem"></textarea>

<button onclick="abrirPopup()">
{{ t.send }}
</button>

<a href="/menu" class="back">
{% if session["lang"] == "en" %}
Back to Menu
{% else %}
Voltar ao Menu
{% endif %}
</a>

</div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">

<h3>
{% if session["lang"] == "en" %}
Confirm submission?
{% else %}
Tem a certeza que quer enviar esta mensagem agora?
{% endif %}
</h3>

<button onclick="confirmar()">
{% if session["lang"] == "en" %}
Confirm
{% else %}
Confirmar
{% endif %}
</button>

<button onclick="fecharPopup()">
{% if session["lang"] == "en" %}
Edit
{% else %}
Editar
{% endif %}
</button>

<button onclick="cancelarTudo()">
{% if session["lang"] == "en" %}
Cancel
{% else %}
Cancelar
{% endif %}
</button>

</div>
</div>

<script>
function abrirPopup(){
    let tipo = document.getElementById("tipo").value;
    let msg = document.getElementById("mensagem").value.trim();

    if(tipo == "" || msg == ""){
        alert("Preencha todos os campos.");
        return;
    }

    document.getElementById("popup").style.display="block";
}

function fecharPopup(){
    document.getElementById("popup").style.display="none";
}

function confirmar(){
    alert("Mensagem enviada com sucesso.");
    cancelarTudo();
}

function cancelarTudo(){
    document.getElementById("tipo").selectedIndex = 0;
    document.getElementById("mensagem").value = "";
    document.getElementById("popup").style.display="none";
}
</script>

</body>
</html>
