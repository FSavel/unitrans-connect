<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
padding:30px;
}

.box{
max-width:420px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:15px;
margin:15px 0;
border:1px solid #ccc;
border-radius:10px;
}

button{
width:100%;
padding:15px;
background:#0d4d2c;
color:white;
border:none;
border-radius:10px;
font-size:16px;
}

.erro{
color:red;
margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<h2>Entrar no Sistema</h2>

<form method="POST">

<input type="text" name="numero" placeholder="Número de trabalhador" required>

<button type="submit">Entrar</button>

</form>

<p class="erro">{{ erro }}</p>

</div>

</body>
</html>
