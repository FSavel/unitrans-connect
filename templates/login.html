<!DOCTYPE html>
<html lang="{{ session['lang'] if session.get('lang') else 'pt' }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
{% if session.get("lang") == "en" %}
Login
{% else %}
Entrar no Sistema
{% endif %}
</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:url("/static/fundo.jpg") no-repeat center center fixed;
    background-size:cover;
}

.overlay{
    min-height:100vh;
    background:rgba(0,0,0,0.55);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    background:white;
    width:100%;
    max-width:420px;
    border-radius:14px;
    padding:30px;
    box-shadow:0 6px 16px rgba(0,0,0,0.20);
    text-align:center;
}

.logo{
    width:90px;
    margin-bottom:15px;
}

h1{
    margin:0;
    color:#0d4d2c;
    font-size:28px;
}

.sub{
    margin-top:10px;
    margin-bottom:22px;
    font-size:14px;
    color:#666;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:15px;
    padding:12px;
    background:#0d4d2c;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#14683c;
}

.error{
    color:red;
    margin-top:15px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="overlay">

<div class="card">

<img src="/static/logo.png" class="logo">

<h1>
{% if session.get("lang") == "en" %}
Login to System
{% else %}
Entrar no Sistema
{% endif %}
</h1>

<p class="sub">
{% if session.get("lang") == "en" %}
Enter your employee number
{% else %}
Insira o seu número de trabalhador
{% endif %}
</p>

<form method="POST">

<input type="text" name="numero" required
placeholder="{% if session.get('lang') == 'en' %}Employee Number{% else %}Número do Trabalhador{% endif %}">

<button type="submit">
{% if session.get("lang") == "en" %}
Login
{% else %}
Entrar
{% endif %}
</button>

</form>

{% if erro %}
<div class="error">{{ erro }}</div>
{% endif %}

</div>
</div>

</body>
</html>
