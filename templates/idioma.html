<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unitrans Connect</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:url('/static/fundo.jpg') center center/cover no-repeat;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.overlay{
    background:rgba(0,0,0,0.65);
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:white;
    padding:40px;
    border-radius:18px;
    text-align:center;
    width:90%;
    max-width:420px;
}

img{
    width:120px;
    margin-bottom:20px;
}

h1{
    color:#0d4d2c;
    margin-bottom:10px;
}

p{
    margin-bottom:25px;
    color:#555;
}

a{
    display:block;
    text-decoration:none;
    background:#0d4d2c;
    color:white;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    font-weight:bold;
}

a:hover{
    background:#11753f;
}
</style>
</head>

<body>

<div class="overlay">
<div class="box">

<img src="/static/logo.png">

<h1>Bem-vindo à Unitrans Connect</h1>

<p>Your Employee Digital Assistant</p>

<a href="/idioma/pt">🇲🇿 Português</a>

<a href="/idioma/en">🇬🇧 English</a>

</div>
</div>

</body>
</html>
