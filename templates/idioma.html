<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unitrans Connect</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:url("/static/fundo.jpg") no-repeat center center fixed;
    background-size:cover;
}

.overlay{
    min-height:100vh;
    background:rgba(0,0,0,0.55);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:20px;
}

.card{
    background:white;
    padding:30px;
    border-radius:14px;
    text-align:center;
    width:100%;
    max-width:420px;
    box-shadow:0 6px 16px rgba(0,0,0,0.25);
}

.logo{
    width:90px;
    margin-bottom:10px;
}

h1{
    color:#0d4d2c;
    margin-bottom:5px;
}

.tagline{
    font-size:14px;
    color:#666;
    margin-bottom:25px;
    font-style:italic;
}

button{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    background:#0d4d2c;
    color:white;
}

button:hover{
    background:#14683c;
}

.secondary{
    background:#444;
}

.secondary:hover{
    background:#222;
}

.small-text{
    margin-top:15px;
    font-size:13px;
    color:#ddd;
}
</style>
</head>

<body>

<div class="overlay">

<div class="card">

<img src="/static/logo.png" class="logo">

<h1>Unitrans Connect</h1>

<p class="tagline">
A sua experiência digital / Your digital experience
</p>

<!-- BOTÃO SOBRE -->
<a href="/sobre" style="text-decoration:none;">
    <button class="secondary">
        Sobre Nós / About Us
    </button>
</a>

<!-- IDIOMAS -->
<a href="/idioma/pt" style="text-decoration:none;">
    <button>Português</button>
</a>

<a href="/idioma/en" style="text-decoration:none;">
    <button>English</button>
</a>

<p class="small-text">
Seleccione o idioma / Select language
</p>

</div>

</div>

</body>
</html>
